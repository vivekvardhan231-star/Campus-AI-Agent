<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Campus AI Agent Architecture v2</title>
<style>
  :root {
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5f5e5a;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4ef;
    --color-border-tertiary: rgba(0,0,0,0.15);
    --font-sans: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e6dc;
      --color-text-secondary: #9c9a92;
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #2a2a27;
      --color-border-tertiary: rgba(255,255,255,0.12);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    padding: 2rem 1rem;
    min-height: 100vh;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 0.25rem; }
  p.sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 12px;
    padding: 1.5rem;
    max-width: 760px;
    margin: 0 auto;
  }
  svg text { font-family: var(--font-sans); }

  /* color ramps — light */
  .c-purple rect, .c-purple circle { fill:#EEEDFE; stroke:#534AB7; }
  .c-purple text.th { fill:#3C3489; } .c-purple text.ts { fill:#534AB7; }
  .c-teal rect, .c-teal circle { fill:#E1F5EE; stroke:#0F6E56; }
  .c-teal text.th { fill:#085041; } .c-teal text.ts { fill:#0F6E56; }
  .c-amber rect, .c-amber circle { fill:#FAEEDA; stroke:#854F0B; }
  .c-amber text.th { fill:#633806; } .c-amber text.ts { fill:#854F0B; }
  .c-coral rect, .c-coral circle { fill:#FAECE7; stroke:#993C1D; }
  .c-coral text.th { fill:#712B13; } .c-coral text.ts { fill:#993C1D; }
  .c-green rect, .c-green circle { fill:#EAF3DE; stroke:#3B6D11; }
  .c-green text.th { fill:#27500A; } .c-green text.ts { fill:#3B6D11; }
  .c-gray rect, .c-gray circle { fill:#F1EFE8; stroke:#5F5E5A; }
  .c-gray text.th { fill:#444441; } .c-gray text.ts { fill:#5F5E5A; }

  /* dark mode */
  @media (prefers-color-scheme: dark) {
    .c-purple rect, .c-purple circle { fill:#26215C; stroke:#AFA9EC; }
    .c-purple text.th { fill:#CECBF6; } .c-purple text.ts { fill:#AFA9EC; }
    .c-teal rect, .c-teal circle { fill:#04342C; stroke:#5DCAA5; }
    .c-teal text.th { fill:#9FE1CB; } .c-teal text.ts { fill:#5DCAA5; }
    .c-amber rect, .c-amber circle { fill:#412402; stroke:#EF9F27; }
    .c-amber text.th { fill:#FAC775; } .c-amber text.ts { fill:#EF9F27; }
    .c-coral rect, .c-coral circle { fill:#4A1B0C; stroke:#F0997B; }
    .c-coral text.th { fill:#F5C4B3; } .c-coral text.ts { fill:#F0997B; }
    .c-green rect, .c-green circle { fill:#173404; stroke:#97C459; }
    .c-green text.th { fill:#C0DD97; } .c-green text.ts { fill:#97C459; }
    .c-gray rect, .c-gray circle { fill:#2C2C2A; stroke:#B4B2A9; }
    .c-gray text.th { fill:#D3D1C7; } .c-gray text.ts { fill:#B4B2A9; }
  }

  text.th { font-size:14px; font-weight:500; fill:var(--color-text-primary); }
  text.ts { font-size:12px; font-weight:400; fill:var(--color-text-secondary); }
  line.arr, path.arr { stroke: var(--color-text-secondary); stroke-width:1.5; fill:none; }
  .node { cursor:pointer; }
  .node:hover rect, .node:hover circle { opacity:0.85; }

  .info-box {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 1rem;
    text-align: center;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Campus AI Agent — System Architecture</h1>
  <p class="sub">Click any node to see component details. Right column activates only when a booking action is required.</p>

  <svg width="100%" viewBox="0 0 680 1220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- column labels -->
  <text class="ts" x="250" y="22" text-anchor="middle" fill="#5f5e5a">Main flow</text>
  <text class="ts" x="530" y="22" text-anchor="middle" fill="#5f5e5a">Action path (booking only)</text>

  <!-- 1. User query -->
  <g class="node c-gray" onclick="showInfo('user-query')">
    <rect x="100" y="34" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="55" text-anchor="middle" dominant-baseline="central">User query</text>
    <text class="ts" x="250" y="73" text-anchor="middle" dominant-baseline="central">Natural language input</text>
  </g>
  <line x1="250" y1="86" x2="250" y2="116" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. NLP pre-processing -->
  <g class="node c-purple" onclick="showInfo('nlp')">
    <rect x="100" y="116" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="137" text-anchor="middle" dominant-baseline="central">NLP pre-processing</text>
    <text class="ts" x="250" y="155" text-anchor="middle" dominant-baseline="central">Tokenise · entity extract · normalise</text>
  </g>
  <line x1="250" y1="168" x2="250" y2="198" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Intent classifier -->
  <g class="node c-purple" onclick="showInfo('intent')">
    <rect x="100" y="198" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="219" text-anchor="middle" dominant-baseline="central">Intent classifier</text>
    <text class="ts" x="250" y="237" text-anchor="middle" dominant-baseline="central">Zero-shot + fine-tuned BERT</text>
  </g>

  <!-- fan to 3 routers -->
  <path d="M250 250 L250 265 L110 265 L110 280" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M250 250 L250 265 L270 265 L270 280" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M250 250 L250 265 L430 265 L430 280" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. Routers -->
  <g class="node c-teal" onclick="showInfo('events-router')">
    <rect x="40" y="280" width="140" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="301" text-anchor="middle" dominant-baseline="central">Events router</text>
    <text class="ts" x="110" y="319" text-anchor="middle" dominant-baseline="central">Calendar · venues</text>
  </g>
  <g class="node c-teal" onclick="showInfo('facilities-router')">
    <rect x="200" y="280" width="140" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="270" y="301" text-anchor="middle" dominant-baseline="central">Facilities router</text>
    <text class="ts" x="270" y="319" text-anchor="middle" dominant-baseline="central">Rooms · labs</text>
  </g>
  <g class="node c-teal" onclick="showInfo('bookings-router')">
    <rect x="360" y="280" width="140" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="301" text-anchor="middle" dominant-baseline="central">Bookings router</text>
    <text class="ts" x="430" y="319" text-anchor="middle" dominant-baseline="central">Reservation system</text>
  </g>

  <!-- merge routers → data retrieval -->
  <path d="M110 332 L110 380 L250 380 L250 398" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M270 332 L270 370 L250 370 L250 398" fill="none" stroke="#888780" stroke-width="1.5"/>
  <path d="M430 332 L430 380 L250 380" fill="none" stroke="#888780" stroke-width="1.5"/>

  <!-- 5. Data retrieval -->
  <rect x="40" y="398" width="420" height="52" rx="8" fill="none" stroke="#b4b2a9" stroke-dasharray="5 3" stroke-width="0.8"/>
  <text class="ts" x="250" y="418" text-anchor="middle" fill="#5f5e5a">Data retrieval</text>
  <text class="ts" x="250" y="438" text-anchor="middle" fill="#5f5e5a">Events API · Facilities DB · Booking system</text>
  <line x1="250" y1="450" x2="250" y2="480" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. Context builder -->
  <g class="node c-purple" onclick="showInfo('context')">
    <rect x="100" y="480" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="501" text-anchor="middle" dominant-baseline="central">Context builder</text>
    <text class="ts" x="250" y="519" text-anchor="middle" dominant-baseline="central">Merge · rank · fit token budget</text>
  </g>
  <line x1="250" y1="532" x2="250" y2="562" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. Constraint validator -->
  <g class="node c-amber" onclick="showInfo('constraints')">
    <rect x="100" y="562" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="583" text-anchor="middle" dominant-baseline="central">Constraint validator</text>
    <text class="ts" x="250" y="601" text-anchor="middle" dominant-baseline="central">Availability · policy · eligibility</text>
  </g>
  <line x1="250" y1="614" x2="250" y2="644" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8. Decision diamond -->
  <polygon points="250,644 330,678 250,712 170,678" fill="none" stroke="#888780" stroke-width="1"/>
  <text class="th" x="250" y="673" text-anchor="middle" dominant-baseline="central" fill="#444441">Action</text>
  <text class="th" x="250" y="689" text-anchor="middle" dominant-baseline="central" fill="#444441">needed?</text>

  <!-- no → down -->
  <line x1="250" y1="712" x2="250" y2="742" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="234" y="730" text-anchor="end" fill="#5f5e5a">no</text>

  <!-- yes → right to action column -->
  <path d="M330 678 L460 678" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="392" y="670" text-anchor="middle" fill="#5f5e5a">yes</text>

  <!-- 9. Response generator -->
  <g class="node c-green" onclick="showInfo('response-gen')">
    <rect x="100" y="742" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="763" text-anchor="middle" dominant-baseline="central">Response generator</text>
    <text class="ts" x="250" y="781" text-anchor="middle" dominant-baseline="central">LLM + template · tone control</text>
  </g>
  <line x1="250" y1="794" x2="250" y2="824" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 10. Guardrails -->
  <g class="node c-amber" onclick="showInfo('guardrails')">
    <rect x="100" y="824" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="845" text-anchor="middle" dominant-baseline="central">Guardrails &amp; safety check</text>
    <text class="ts" x="250" y="863" text-anchor="middle" dominant-baseline="central">PII redact · policy filter · fallback</text>
  </g>
  <line x1="250" y1="876" x2="250" y2="906" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 11. Response to user -->
  <g class="node c-gray" onclick="showInfo('output')">
    <rect x="100" y="906" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="927" text-anchor="middle" dominant-baseline="central">Response to user</text>
    <text class="ts" x="250" y="945" text-anchor="middle" dominant-baseline="central">Chat · email · portal widget</text>
  </g>
  <line x1="250" y1="958" x2="250" y2="988" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 12. Audit log -->
  <g class="node c-gray" onclick="showInfo('audit')">
    <rect x="100" y="988" width="300" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="250" y="1009" text-anchor="middle" dominant-baseline="central">Audit log &amp; feedback loop</text>
    <text class="ts" x="250" y="1027" text-anchor="middle" dominant-baseline="central">Trace · rating · fine-tune queue</text>
  </g>

  <!-- ══ RIGHT COLUMN ══ -->

  <!-- A. Confirmation gate -->
  <g class="node c-coral" onclick="showInfo('confirmation')">
    <rect x="390" y="706" width="240" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="727" text-anchor="middle" dominant-baseline="central">Confirmation gate</text>
    <text class="ts" x="510" y="745" text-anchor="middle" dominant-baseline="central">Show summary · await yes/no</text>
  </g>
  <line x1="510" y1="758" x2="510" y2="788" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- cancel loop back (dashed) -->
  <path d="M390 732 L358 732 L358 224 L400 224" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="354" y="720" text-anchor="end" fill="#5f5e5a">cancel</text>

  <!-- B. Action executor -->
  <g class="node c-coral" onclick="showInfo('executor')">
    <rect x="390" y="788" width="240" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="510" y="809" text-anchor="middle" dominant-baseline="central">Action executor</text>
    <text class="ts" x="510" y="827" text-anchor="middle" dominant-baseline="central">Write booking · send receipt</text>
  </g>

  <!-- merge back into response generator row -->
  <path d="M510 840 L510 868 L400 868" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ══ LEGEND ══ -->
  <rect x="40" y="1066" width="600" height="118" rx="8" fill="none" stroke="#b4b2a9" stroke-dasharray="4 3" stroke-width="0.5"/>
  <text class="ts" x="340" y="1086" text-anchor="middle" fill="#5f5e5a">Legend — click any node to see details</text>

  <rect x="60"  y="1100" width="12" height="12" rx="2" style="fill:#EEEDFE;stroke:#534AB7;stroke-width:0.5"/>
  <text class="ts" x="78"  y="1110" fill="#5f5e5a">NLP / LLM</text>
  <rect x="170" y="1100" width="12" height="12" rx="2" style="fill:#E1F5EE;stroke:#0F6E56;stroke-width:0.5"/>
  <text class="ts" x="188" y="1110" fill="#5f5e5a">Routing</text>
  <rect x="268" y="1100" width="12" height="12" rx="2" style="fill:#FAEEDA;stroke:#854F0B;stroke-width:0.5"/>
  <text class="ts" x="286" y="1110" fill="#5f5e5a">Validation</text>
  <rect x="376" y="1100" width="12" height="12" rx="2" style="fill:#FAECE7;stroke:#993C1D;stroke-width:0.5"/>
  <text class="ts" x="394" y="1110" fill="#5f5e5a">Action</text>
  <rect x="460" y="1100" width="12" height="12" rx="2" style="fill:#EAF3DE;stroke:#3B6D11;stroke-width:0.5"/>
  <text class="ts" x="478" y="1110" fill="#5f5e5a">Response</text>
  <rect x="560" y="1100" width="12" height="12" rx="2" style="fill:#F1EFE8;stroke:#5F5E5A;stroke-width:0.5"/>
  <text class="ts" x="578" y="1110" fill="#5f5e5a">I/O</text>

  <text class="ts" x="60" y="1142" fill="#5f5e5a">Solid arrow = normal flow</text>
  <text class="ts" x="60" y="1158" fill="#5f5e5a">Dashed arrow = cancel / loop-back     Right column activates only on booking intent</text>
  </svg>

  <div class="info-box" id="info-panel">Click any component node above to see details here.</div>
</div>

<script>
const info = {
  "user-query":       { title:"User query",               text:"Natural language text entered via chat, portal, or voice-to-text. Supports English and can be extended via translation pre-processing." },
  "nlp":              { title:"NLP pre-processing (spaCy)", text:"Tokenises input, runs named-entity recognition to detect room names, dates, times, event titles, and people. Normalises synonyms so 'reserve' = 'book' = 'schedule'." },
  "intent":           { title:"Intent classifier (Hugging Face BERT)", text:"Fine-tuned bert-base-uncased classifies intent as events, facilities, bookings, or ambiguous. If top-2 scores are within 15%, the agent asks a clarifying question." },
  "events-router":    { title:"Events router",             text:"Dispatches to the campus calendar REST API. Requests schedule, speakers, venue, and capacity fields. Handles pagination and date-range queries." },
  "facilities-router":{ title:"Facilities router",         text:"Dispatches to the facilities PostgreSQL database via SQLAlchemy. Retrieves room specs, operational hours, equipment lists, and building maps." },
  "bookings-router":  { title:"Bookings router",           text:"Dispatches to the reservation system (REST or legacy SOAP). Reads existing reservations, user booking history, and per-resource booking policies." },
  "context":          { title:"Context builder",           text:"Merges results from all retrieved sources into a single ranked context object. Uses BM25 to score relevance to the original query. Truncates to fit within the LLM's token budget (~3000 tokens)." },
  "constraints":      { title:"Constraint validator",      text:"Deterministic rule checks — not LLM-based: Is the slot within operating hours? Does room capacity meet the request? Is the user eligible? Is the slot already taken? Returns a verdict with reason codes." },
  "confirmation":     { title:"Confirmation gate",         text:"Serialises the proposed action into plain English and presents it to the user with Confirm / Cancel buttons. No booking is created without explicit confirmation. On cancel, state resets to intent classification." },
  "executor":         { title:"Action executor",           text:"POSTs the booking to the reservation API with an idempotency key (user ID + room + slot hash) to prevent duplicate reservations on retry. Captures the booking reference and generates a confirmation receipt." },
  "response-gen":     { title:"Response generator (LangChain + LLM)", text:"Uses a LangChain LLMChain with a campus-branded system prompt. Slot-fills templates for common response types (availability list, event details, booking receipt) rather than generating free-form prose." },
  "guardrails":       { title:"Guardrails & safety check (Microsoft Presidio)", text:"Redacts PII (student IDs, personal emails) that may have leaked into the response. Applies a content policy filter. Falls back to a safe template if the LLM output is incoherent or hedged." },
  "output":           { title:"Response to user",          text:"Delivered via the chat interface, email, or an embedded campus portal widget. Includes booking reference, event links, or room detail cards as appropriate." },
  "audit":            { title:"Audit log & feedback loop (structlog + Elasticsearch)", text:"Every interaction is logged with full trace: intent, retrieved data, constraint results, confirmation outcome, and final response. Low-rated interactions are queued for human review and fine-tuning." }
};

function showInfo(id) {
  const panel = document.getElementById('info-panel');
  const d = info[id];
  if (d) panel.innerHTML = '<strong>' + d.title + '</strong> — ' + d.text;
}
</script>
</body>
</html>
